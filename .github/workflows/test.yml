name: test

on:
  push:
  pull_request:

jobs:
  ert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: 29.4
      - run: emacs -Q --batch -L . -l test/org-markgraf-test.el -f ert-run-tests-batch-and-exit
